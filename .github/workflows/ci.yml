name: Java CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      APP_ENCRYPTION_KEY: "1234567890123456"

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache do Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build e empacotar JAR
        run: mvn clean package -DskipTests -DargLine="--add-opens java.base/java.util=ALL-UNNAMED"

      - name: Rodar testes
        run: mvn test -DargLine="--add-opens java.base/java.util=ALL-UNNAMED"

      - name: Upload do artefato JAR
        uses: actions/upload-artifact@v4
        with:
          name: my-app-jar-${{ github.run_number }}
          path: target/*.jar
          retention-days: 30

  cleanup:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Limpar artefatos antigos
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: "0 seconds"
          skip-recent: 3
          skip-tags: true
